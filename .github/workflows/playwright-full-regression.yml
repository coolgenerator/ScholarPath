name: Playwright Full Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PLAYWRIGHT_SKIP_WEBSERVER: '1'
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Start backend stack
        run: docker compose up -d postgres redis app celery_worker frontend

      - name: Run DB migration
        run: docker compose run --rm app alembic upgrade head

      - name: Wait for services
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/docs > /dev/null; then
              break
            fi
            sleep 2
          done
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/docs > /dev/null
          curl -fsS http://127.0.0.1:5173 > /dev/null

      - name: Seed baseline data
        run: |
          set -euo pipefail
          curl -fsS -X POST http://127.0.0.1:8000/api/seed/schools > /dev/null
          curl -fsS -X POST http://127.0.0.1:8000/api/seed/demo-student > /dev/null
          curl -fsS -X POST http://127.0.0.1:8000/api/seed/demo-evaluations > /dev/null
          curl -fsS -X POST http://127.0.0.1:8000/api/seed/demo-offers > /dev/null

      - name: Run Playwright legacy probe (fail-fast)
        run: npm --prefix frontend run e2e:live:legacy:ci

      - name: Run API hard-cut route checks
        run: docker compose run --rm app python -m pytest tests/test_api.py -k HardCutRoutes -q

      - name: Run Playwright full regression (contract + live)
        run: npm --prefix frontend run e2e:full:ci

      - name: Capture docker logs on failure
        if: failure()
        run: |
          mkdir -p frontend/output/playwright
          docker compose logs --no-color > frontend/output/playwright/docker-compose.log

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/output/playwright
          if-no-files-found: warn

      - name: Stop stack
        if: always()
        run: docker compose down -v
